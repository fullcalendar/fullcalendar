<!DOCTYPE html>
<html>
  <head>
    <link rel='stylesheet' href='../../vanilla/dist/skeleton.css' />
    <link rel='stylesheet' href='../../vanilla/dist/themes/classic/theme.css' />
    <link rel='stylesheet' href='../../vanilla/dist/themes/classic/palette.css' />

    <!-- NOTE: you must run this from a WEB SERVER (localhost) or else CORS problems  -->
    <!-- TODO: update importmap.public.html with public version of these URLs -->
    <script type='importmap'>
      {
        "imports": {
          "preact": "../../vanilla/node_modules/preact/dist/preact.mjs",
          "preact/hooks": "../../vanilla/node_modules/preact/hooks/dist/hooks.mjs",
          "preact/jsx-runtime": "../../vanilla/node_modules/preact/jsx-runtime/dist/jsxRuntime.mjs",
          "preact/compat": "../../vanilla/node_modules/preact/compat/dist/compat.mjs",
          "preact/compat/client": "../../vanilla/node_modules/preact/compat/client.mjs",
          "temporal-polyfill/fns/ZonedDateTime": "../../vanilla/node_modules/temporal-polyfill/fns/ZonedDateTime.js",
          "temporal-polyfill/fns/PlainDateTime": "../../vanilla/node_modules/temporal-polyfill/fns/PlainDateTime.js",
          "temporal-polyfill/fns/Instant": "../../vanilla/node_modules/temporal-polyfill/fns/Instant.js",
          "temporal-utils": "../node_modules/temporal-utils/dist/index.js",
          "temporal-utils/protected": "../node_modules/temporal-utils/dist/protected.js",
          "temporal-utils/protected-error-messages": "../node_modules/temporal-utils/dist/protected-error-messages.js",
          "@full-ui/headless-calendar": "../../vanilla/node_modules/@full-ui/headless-calendar/index.js",
          "fullcalendar": "../../vanilla/dist/index.js",
          "fullcalendar/themes/classic": "../../vanilla/dist/themes/classic/index.js",
          "fullcalendar/interaction": "../../vanilla/dist/interaction.js",
          "fullcalendar/daygrid": "../../vanilla/dist/daygrid.js",
          "fullcalendar/timegrid": "../../vanilla/dist/timegrid.js",
          "fullcalendar/list": "../../vanilla/dist/list.js"
        }
      }
    </script>
    <script type='module'>
      import { Calendar } from 'fullcalendar'
      import classicThemePlugin from 'fullcalendar/themes/classic'
      import interactionPlugin from 'fullcalendar/interaction'
      import dayGridPlugin from 'fullcalendar/daygrid'
      import timeGridPlugin from 'fullcalendar/timegrid'
      import listPlugin from 'fullcalendar/list'

      document.addEventListener('DOMContentLoaded', function() {
        var calendarEl = document.getElementById('calendar');

        var calendar = new Calendar(calendarEl, {
          plugins: [classicThemePlugin, interactionPlugin, dayGridPlugin, timeGridPlugin, listPlugin],
          headerToolbar: {
            left: 'prev,next today',
            center: 'title',
            right: 'dayGridMonth,timeGridWeek,timeGridDay,listWeek'
          },
          initialDate: '2020-09-12',
          editable: true,
          navLinks: true, // can click day/week names to navigate views
          dayMaxEvents: true, // allow "more" link when too many events
          events: [
            {
              title: 'All Day Event',
              start: '2020-09-01'
            },
            {
              title: 'Long Event',
              start: '2020-09-07',
              end: '2020-09-10'
            },
            {
              groupId: 999,
              title: 'Repeating Event',
              start: '2020-09-09T16:00:00'
            },
            {
              groupId: 999,
              title: 'Repeating Event',
              start: '2020-09-16T16:00:00'
            },
            {
              title: 'Conference',
              start: '2020-09-11',
              end: '2020-09-13'
            },
            {
              title: 'Meeting',
              start: '2020-09-12T10:30:00',
              end: '2020-09-12T12:30:00'
            },
            {
              title: 'Lunch',
              start: '2020-09-12T12:00:00'
            },
            {
              title: 'Meeting',
              start: '2020-09-12T14:30:00'
            },
            {
              title: 'Happy Hour',
              start: '2020-09-12T17:30:00'
            },
            {
              title: 'Dinner',
              start: '2020-09-12T20:00:00'
            },
            {
              title: 'Birthday Party',
              start: '2020-09-13T07:00:00'
            },
            {
              title: 'Click for Google',
              url: 'http://google.com/',
              start: '2020-09-28'
            }
          ]
        });

        calendar.render();
      });
    </script>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
        font-size: 14px;
      }

      #script-warning {
        display: none;
        background: #eee;
        border-bottom: 1px solid #ddd;
        padding: 0 10px;
        line-height: 40px;
        text-align: center;
        font-weight: bold;
        font-size: 12px;
        color: red;
      }

      #loading {
        display: none;
        position: absolute;
        top: 10px;
        right: 10px;
      }

      #calendar {
        max-width: 1100px;
        margin: 40px auto;
        padding: 0 10px;
      }
    </style>
  </head>
  <body>
    <div id='calendar'></div>
  </body>
</html>
