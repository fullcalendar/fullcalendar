<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8' />

<link rel='stylesheet' href='../../vanilla/dist/skeleton.css' />
<link rel='stylesheet' href='../../vanilla/dist/themes/classic/theme.css' />
<link rel='stylesheet' href='../../vanilla/dist/themes/classic/palette.css' />

<script src='https://cdn.jsdelivr.net/npm/rrule@2.6.6/dist/es5/rrule.js'></script>
<script src='../../vanilla/dist/all/global.js'></script>
<script src='../../vanilla/dist/themes/classic/global.js'></script>
<script src='../../rrule/dist/global.js'></script>
<script>

  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      headerToolbar: {
        start: 'title',
        end: 'today prev,next',
      },
      initialDate: '2020-09-12',
      editable: true,
      events: [
        {
          title: 'rrule event',
          rrule: {
            dtstart: '2020-09-09T13:00:00',
            // until: '2020-09-01',
            freq: 'weekly'
          },
          duration: '02:00'
        }
      ],
      eventClick: function(info) {
        if (confirm('delete event?')) {
          info.event.remove()
        }
      }
    });

    calendar.render();
  });

</script>
<style>

  body {
    margin: 40px 10px;
    padding: 0;
    font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
    font-size: 14px;
  }

  #calendar {
    max-width: 900px;
    margin: 0 auto;
  }

</style>
</head>
<body>

  <div id='calendar'></div>

</body>
</html>
