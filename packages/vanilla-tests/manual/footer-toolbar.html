<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8' />

<link rel='stylesheet' href='../../vanilla/dist/skeleton.css' />
<link rel='stylesheet' href='../../vanilla/dist/themes/classic/theme.css' />
<link rel='stylesheet' href='../../vanilla/dist/themes/classic/palette.css' />

<script src='../../vanilla/dist/all/global.js'></script>
<script src='../../vanilla/dist/themes/classic/global.js'></script>
<script>

  document.addEventListener('DOMContentLoaded', function() {
    var calendarEl = document.getElementById('calendar');

    var calendar = new FullCalendar.Calendar(calendarEl, {
      headerToolbar: {
        start: 'title',
        end: 'today prev,next',
      },
      footerToolbar: {
        start: 'title',
        end: 'today prev,next',
      },
      initialDate: '2023-01-01',
      initialView: 'dayGridMonth',
      editable: true,
      selectable: true,
      businessHours: true,
      dayMaxEvents: true, // allow "more" link when too many events
    });

    calendar.render();
  });

</script>
<style>

  body {
    margin: 40px 10px;
    padding: 0;
    font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
    font-size: 14px;
  }

  #calendar {
    max-width: 1100px;
    margin: 0 auto;
  }

</style>
</head>
<body>

  <p>Test: scroll to bottom and click "Next" in the footer toolbar. Ensure page doesn't jump</p>

  <div id='calendar'></div>

</body>
</html>
