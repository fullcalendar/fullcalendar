<!DOCTYPE html>
<html>
<head>
<meta charset='utf-8' />

<!-- styles -->
<script src='../dist/skeleton.styles.js'></script>
<script src='../dist/themes/classic/theme.styles.js'></script>
<link rel='stylesheet' href='../dist/themes/classic/palette.css' />

<script src='../dist/all/global.js'></script>
<script src='../dist/themes/classic/global.js'></script>
<script src='../dist/locales-all/global.js'></script>
<script>

  document.addEventListener('DOMContentLoaded', function() {
    var initialLocaleCode = 'en';
    var localeSelectorEl = document.getElementById('locale-selector');
    var calendarEl = document.querySelector('full-calendar');
    var calendarApi = calendarEl.getApi();

    // build the locale selector's options
    calendarApi.getAvailableLocaleCodes().forEach(function(localeCode) {
      var optionEl = document.createElement('option');
      optionEl.value = localeCode;
      optionEl.selected = localeCode == initialLocaleCode;
      optionEl.innerText = localeCode;
      localeSelectorEl.appendChild(optionEl);
    });

    // when the selected option changes, dynamically change the calendar option
    localeSelectorEl.addEventListener('change', function() {
      if (this.value) {
        calendarApi.setOption('locale', this.value);
      }
    });
  });

</script>
<style>

  body {
    margin: 0;
    padding: 0;
    font-family: Arial, Helvetica Neue, Helvetica, sans-serif;
    font-size: 14px;
